name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-linux:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Install libcurl
        run: sudo apt-get install -y libcurl4-openssl-dev
      - name: Build
        run: ./gradlew linkWeatherReleaseExecutableLinux --no-daemon
      - name: Rename binary
        run: cp build/bin/linux/weatherReleaseExecutable/weather.kexe weather-linux-x64
      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: weather-linux-x64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


  build-macos-arm64:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Build
        run: ./gradlew linkWeatherReleaseExecutableMacosArm64 --no-daemon
      - name: Rename binary
        run: cp build/bin/macosArm64/weatherReleaseExecutable/weather.kexe weather-macos-arm64
      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: weather-macos-arm64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows-x64:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Build
        shell: bash
        run: ./gradlew linkWeatherReleaseExecutableMingwX64 --no-daemon
      - name: Rename binary
        shell: pwsh
        run: |
          $src = "build\bin\mingwX64\weatherReleaseExecutable\weather.exe"
          if (!(Test-Path $src)) {
            Get-ChildItem -Recurse build\bin\ -ErrorAction SilentlyContinue
            throw "Binary not found at $src"
          }
          Copy-Item $src weather-windows-x64.exe
      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: weather-windows-x64.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
